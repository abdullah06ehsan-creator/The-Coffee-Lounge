<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brew & Bite Elite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Brew & Bite Elite ☕</h1>
    <nav>
      <a href="#menu">Menu</a>
      <a href="#booking">Booking</a>
      <a href="#reviews">Reviews</a>
      <a href="#location">Location</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Luxury Cafe Experience</h2>
    <p>Premium coffee, bakery & gourmet food</p>
    <button onclick="orderNow()">🛒 Order Now</button>
  </section>

  <section id="menu" class="section">
    <h2>Menu 💰</h2>
    <div class="cards">
      <div class="card"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800"><h3>Cafe Latte</h3><p>$4.99</p></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800"><h3>Cappuccino</h3><p>$4.49</p></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=800"><h3>Chocolate Cake</h3><p>$6.99</p></div>
    </div>
  </section>

  <section id="booking" class="section">
    <h2>Reserve a Table 📅</h2>
    <form>
      <input type="text" placeholder="Your Name" />
      <input type="date" />
      <input type="time" />
      <button type="submit">Reserve</button>
    </form>
  </section>

  <section id="reviews" class="section">
    <h2>Customer Reviews ⭐</h2>
    <p>“Amazing coffee and ambience!” — Ali</p>
  </section>

  <section id="location" class="section">
    <h2>Find Us 📍</h2>
    <iframe src="https://www.google.com/maps?q=Karachi&output=embed"></iframe>
  </section>

  <script src="script.js"></script>
</body>
</html>
